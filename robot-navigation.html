<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robot Navigation — BFS vs DFS</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0c10;
      --panel: #0f1218;
      --border: #1e2530;
      --border-glow: #2a3a50;
      --text: #c8d8e8;
      --text-dim: #4a6070;
      --text-bright: #e8f4ff;

      --teal: #1de3a0;
      --teal-dim: #0a4a35;
      --teal-glow: rgba(29,227,160,0.15);
      --purple: #8b7fff;
      --purple-dim: #2a2060;
      --purple-glow: rgba(139,127,255,0.15);
      --amber: #ffc842;
      --amber-dim: #3a2a00;
      --red: #ff5a5a;
      --red-dim: #3a0a0a;
      --slate: #1e2a3a;
      --visited: #1a3050;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      gap: 18px;
    }

    /* Subtle scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* ── Header ── */
    header {
      text-align: center;
    }
    .title {
      font-family: 'Orbitron', monospace;
      font-weight: 800;
      font-size: clamp(18px, 4vw, 28px);
      letter-spacing: 0.15em;
      color: var(--text-bright);
      text-transform: uppercase;
    }
    .subtitle {
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      margin-top: 4px;
    }

    /* ── Stats row ── */
    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .stat {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 18px;
      text-align: center;
      min-width: 100px;
    }
    .stat-label {
      font-size: 9px;
      letter-spacing: 0.18em;
      color: var(--text-dim);
      text-transform: uppercase;
    }
    .stat-val {
      font-family: 'Orbitron', monospace;
      font-size: 20px;
      font-weight: 600;
      margin-top: 2px;
      color: var(--text-bright);
      transition: color 0.2s;
    }
    .stat-val.bfs { color: var(--teal); }
    .stat-val.dfs { color: var(--purple); }

    /* ── Controls ── */
    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.1em;
      padding: 8px 16px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text-dim);
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.15s;
      position: relative;
      overflow: hidden;
    }
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .btn:hover { color: var(--text); border-color: var(--border-glow); }
    .btn.active {
      color: var(--amber);
      border-color: var(--amber);
      background: rgba(255,200,66,0.08);
    }
    .btn-bfs {
      color: var(--teal);
      border-color: var(--teal-dim);
      background: var(--teal-glow);
    }
    .btn-bfs:hover { border-color: var(--teal); background: rgba(29,227,160,0.2); }
    .btn-dfs {
      color: var(--purple);
      border-color: var(--purple-dim);
      background: var(--purple-glow);
    }
    .btn-dfs:hover { border-color: var(--purple); background: rgba(139,127,255,0.2); }
    .btn-clear { color: var(--text-dim); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Hint ── */
    #hint {
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      min-height: 16px;
    }
    #hint span { color: var(--amber); }

    /* ── Grid wrapper ── */
    .grid-wrap {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      position: relative;
    }
    /* Corner decorations */
    .grid-wrap::before, .grid-wrap::after {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      border-color: var(--teal);
      border-style: solid;
    }
    .grid-wrap::before { top: 4px; left: 4px; border-width: 2px 0 0 2px; }
    .grid-wrap::after  { bottom: 4px; right: 4px; border-width: 0 2px 2px 0; }

    #grid {
      display: grid;
      gap: 2px;
      user-select: none;
    }

    .cell {
      width: 22px; height: 22px;
      border-radius: 3px;
      background: var(--slate);
      border: 1px solid var(--border);
      cursor: crosshair;
      transition: background 0.1s;
    }
    .cell:hover { border-color: var(--border-glow); }
    .cell.wall {
      background: #0a0d12;
      border-color: #111520;
      cursor: pointer;
    }
    .cell.start {
      background: var(--teal-dim);
      border-color: var(--teal);
      box-shadow: 0 0 6px rgba(29,227,160,0.4);
      cursor: grab;
    }
    .cell.end {
      background: var(--red-dim);
      border-color: var(--red);
      box-shadow: 0 0 6px rgba(255,90,90,0.4);
      cursor: grab;
    }
    .cell.visited {
      background: var(--visited);
      border-color: #243550;
      transition: background 0.15s;
    }
    .cell.path {
      background: var(--amber-dim);
      border-color: var(--amber);
      box-shadow: 0 0 4px rgba(255,200,66,0.3);
      transition: background 0.1s;
    }

    /* ── Legend ── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--text-dim);
    }
    .leg { display: flex; align-items: center; gap: 6px; }
    .leg-dot {
      width: 12px; height: 12px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    /* ── Footer ── */
    footer {
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
    }
  </style>
</head>
<body>

  <header>
    <div class="title">Robot Navigation</div>
    <div class="subtitle">pathfinding visualizer &mdash; BFS vs DFS</div>
  </header>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Algorithm</div>
      <div class="stat-val" id="s-algo">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Explored</div>
      <div class="stat-val" id="s-explored">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Path Length</div>
      <div class="stat-val" id="s-path">—</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn active" id="btn-wall"  onclick="setMode('wall')">Draw Walls</button>
    <button class="btn"        id="btn-start" onclick="setMode('start')">Move Start</button>
    <button class="btn"        id="btn-end"   onclick="setMode('end')">Move Target</button>
    <button class="btn btn-bfs" id="run-bfs" onclick="runAlgorithm('BFS')">▶ BFS</button>
    <button class="btn btn-dfs" id="run-dfs" onclick="runAlgorithm('DFS')">▶ DFS</button>
    <button class="btn btn-clear" onclick="resetGrid()">Clear</button>
  </div>

  <div id="hint">click or drag to <span>draw walls</span></div>

  <div class="grid-wrap">
    <div id="grid"></div>
  </div>

  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:#0a4a35;border:1px solid #1de3a0;box-shadow:0 0 5px rgba(29,227,160,0.4)"></div>Start</div>
    <div class="leg"><div class="leg-dot" style="background:#3a0a0a;border:1px solid #ff5a5a;box-shadow:0 0 5px rgba(255,90,90,0.4)"></div>Target</div>
    <div class="leg"><div class="leg-dot" style="background:#0a0d12;border:1px solid #111520"></div>Wall</div>
    <div class="leg"><div class="leg-dot" style="background:#1a3050;border:1px solid #243550"></div>Explored</div>
    <div class="leg"><div class="leg-dot" style="background:#3a2a00;border:1px solid #ffc842;box-shadow:0 0 4px rgba(255,200,66,0.3)"></div>Path</div>
  </div>

  <footer>click cells to toggle walls &bull; move start/target in their modes</footer>

  <script>
    const ROWS = 20, COLS = 20;
    let grid = [];
    let startPos = [2, 2];
    let endPos = [17, 17];
    let mode = 'wall';
    let painting = false;
    let running = false;

    function setMode(m) {
      mode = m;
      ['wall','start','end'].forEach(id => {
        document.getElementById('btn-' + id).classList.toggle('active', id === m);
      });
      const hints = {
        wall: 'click or drag to <span>draw walls</span>',
        start: 'click a cell to <span>place start</span>',
        end: 'click a cell to <span>place target</span>'
      };
      document.getElementById('hint').innerHTML = hints[m];
    }

    function createGrid() {
      const el = document.getElementById('grid');
      el.style.gridTemplateColumns = `repeat(${COLS}, 22px)`;
      el.style.gridTemplateRows = `repeat(${ROWS}, 22px)`;
      el.innerHTML = '';
      grid = [];
      for (let r = 0; r < ROWS; r++) {
        grid[r] = [];
        for (let c = 0; c < COLS; c++) {
          const div = document.createElement('div');
          div.className = 'cell';
          div.addEventListener('mousedown', e => { e.preventDefault(); painting = true; applyMode(r, c); });
          div.addEventListener('mouseenter', () => { if (painting) applyMode(r, c); });
          div.addEventListener('touchstart', e => { e.preventDefault(); painting = true; applyMode(r, c); }, {passive: false});
          div.addEventListener('touchmove', e => {
            e.preventDefault();
            const t = e.touches[0];
            const target = document.elementFromPoint(t.clientX, t.clientY);
            if (target && target._r !== undefined) applyMode(target._r, target._c);
          }, {passive: false});
          div._r = r; div._c = c;
          el.appendChild(div);
          grid[r][c] = { r, c, wall: false, el: div, parent: null };
        }
      }
      document.addEventListener('mouseup', () => painting = false);
      markSpecial();
    }

    function markSpecial() {
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++)
          grid[r][c].el.classList.remove('start', 'end');
      grid[startPos[0]][startPos[1]].el.classList.add('start');
      grid[endPos[0]][endPos[1]].el.classList.add('end');
    }

    function applyMode(r, c) {
      const isStart = r === startPos[0] && c === startPos[1];
      const isEnd   = r === endPos[0]   && c === endPos[1];
      if (mode === 'wall') {
        if (isStart || isEnd) return;
        grid[r][c].wall = !grid[r][c].wall;
        grid[r][c].el.classList.toggle('wall', grid[r][c].wall);
      } else if (mode === 'start') {
        if (isEnd) return;
        grid[startPos[0]][startPos[1]].el.classList.remove('start');
        startPos = [r, c];
        grid[r][c].wall = false;
        grid[r][c].el.classList.remove('wall');
        grid[r][c].el.classList.add('start');
      } else if (mode === 'end') {
        if (isStart) return;
        grid[endPos[0]][endPos[1]].el.classList.remove('end');
        endPos = [r, c];
        grid[r][c].wall = false;
        grid[r][c].el.classList.remove('wall');
        grid[r][c].el.classList.add('end');
      }
    }

    function clearState() {
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++) {
          grid[r][c].parent = null;
          grid[r][c].el.classList.remove('visited', 'path');
        }
      markSpecial();
      document.getElementById('s-explored').textContent = '—';
      document.getElementById('s-path').textContent = '—';
      document.getElementById('s-algo').textContent = '—';
      document.getElementById('s-algo').className = 'stat-val';
    }

    function setRunning(val) {
      running = val;
      ['run-bfs','run-dfs','btn-wall','btn-start','btn-end'].forEach(id => {
        document.getElementById(id).disabled = val;
      });
    }

    async function runAlgorithm(type) {
      if (running) return;
      setRunning(true);
      clearState();
      document.getElementById('hint').innerHTML = `running <span>${type}</span> — please wait…`;
      const algoEl = document.getElementById('s-algo');
      algoEl.textContent = type;
      algoEl.className = 'stat-val ' + type.toLowerCase();

      let collection = [grid[startPos[0]][startPos[1]]];
      let visited = new Set();
      let found = false;
      let exploredCount = 0;

      while (collection.length > 0) {
        let current = (type === 'BFS') ? collection.shift() : collection.pop();
        const key = `${current.r},${current.c}`;
        if (visited.has(key)) continue;
        if (current.r === endPos[0] && current.c === endPos[1]) { found = true; break; }
        visited.add(key);
        exploredCount++;
        if (!(current.r === startPos[0] && current.c === startPos[1]))
          current.el.classList.add('visited');
        document.getElementById('s-explored').textContent = exploredCount;

        for (let [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
          let nr = current.r + dr, nc = current.c + dc;
          if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && !grid[nr][nc].wall && !visited.has(`${nr},${nc}`)) {
            if (!grid[nr][nc].parent) grid[nr][nc].parent = current;
            collection.push(grid[nr][nc]);
          }
        }
        await new Promise(res => setTimeout(res, 8));
      }

      let pathLen = 0;
      if (found) {
        let curr = grid[endPos[0]][endPos[1]].parent;
        while (curr && !(curr.r === startPos[0] && curr.c === startPos[1])) {
          curr.el.classList.add('path');
          curr = curr.parent;
          pathLen++;
        }
        pathLen++;
        document.getElementById('s-path').textContent = pathLen;
        document.getElementById('hint').innerHTML = `<span>${type}</span> complete — path length ${pathLen}`;
      } else {
        document.getElementById('s-path').textContent = '✕';
        document.getElementById('hint').innerHTML = `<span>no path found</span> — try clearing some walls`;
      }
      setRunning(false);
    }

    function resetGrid() {
      if (running) { running = false; }
      startPos = [2, 2];
      endPos = [17, 17];
      createGrid();
      document.getElementById('s-explored').textContent = '—';
      document.getElementById('s-path').textContent = '—';
      document.getElementById('s-algo').textContent = '—';
      document.getElementById('s-algo').className = 'stat-val';
      document.getElementById('hint').innerHTML = 'click or drag to <span>draw walls</span>';
      ['run-bfs','run-dfs','btn-wall','btn-start','btn-end'].forEach(id => {
        document.getElementById(id).disabled = false;
      });
    }

    createGrid();
  </script>
</body>
</html>
